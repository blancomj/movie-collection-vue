<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexion - Movie Collection</title>
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #333;
      text-align: center;
      padding: 2rem;
    }
    .container {
      max-width: 400px;
    }
    .icon {
      font-size: 4rem;
      color: #ccc;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    p {
      color: #666;
      margin-bottom: 1.5rem;
    }
    button {
      padding: 0.75rem 2rem;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover {
      background: #5a6fd8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon"><i class="fas fa-wifi-slash"></i>&#128246;</div>
    <h1>Sin conexion a internet</h1>
    <p>No se pudo conectar al servidor. Verifica tu conexion y vuelve a intentar.</p>
    <button onclick="window.location.reload()">Reintentar</button>
  </div>
</body>
</html>
